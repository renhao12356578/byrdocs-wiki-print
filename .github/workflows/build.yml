name: Build Extension

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and package zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: byrdocs-wiki-print
          path: release/byrdocs-wiki-print-v*.zip
          if-no-files-found: error

      - name: Commit release zip to repository
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/
          git diff --staged --quiet && echo "No zip changes to commit." && exit 0
          git commit -m "chore: pack extension v$(node -p "require('./package.json').version") [skip ci]"
          git push
